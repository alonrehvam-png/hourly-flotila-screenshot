name: Flotilla Professional Capture

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save images to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Output Folder
        run: mkdir -p output

      - name: Fetch Screenshot from API
        run: |
          # Generate the filename with current date and time
          FILENAME="output/flotilla_$(date +'%Y-%m-%d_%H-%M').png"
          
          # API Parameters:
          # viewport_width/height=3840x2160 -> This creates the "Zoom Out" effect
          # delay=60000 -> 1 minute wait for map data
          # wait_for_network_idle=true -> Ensures all data is downloaded
          
          curl -L "https://api.screenshotone.com/take?access_key=30850cce6fd2bf30464d&url=https://flotilla.forensic-architecture.org/tracker/&viewport_width=3840&viewport_height=2160&delay=60000&wait_for_network_idle=true&block_cookie_banners=true&format=png" -o "$FILENAME"

      - name: Save to Repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add output/
          git commit -m "Capture: $(date)" || echo "No changes"
          git push
