name: Hourly Screenshot Bot

on:
  schedule:
    - cron: '0 * * * *' # This tells GitHub to run it at minute 0 of every hour
  workflow_dispatch: # This allows you to manually click a button to test it immediately

jobs:
  take-and-save-screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the bot permission to save the image back to your repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium

    - name: Run the Python script
      run: python screenshot.py

    - name: Commit and save the image to GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add screenshot.png
        git commit -m "Automated hourly screenshot" || echo "No changes to commit"
        git push
